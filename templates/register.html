<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register - CampusLift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .form-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 24px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .login-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #555;
        }
        
        .login-link a {
            color: #1a73e8;
        }
    </style>
</head>

<body>
    <div class="form-box">
        <h2>🚗 Join CampusLift</h2>
        {% if error %}
        <div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="College Email (.ac.in)" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="text" name="student_id" placeholder="Student ID" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>
        <div class="login-link">Already have an account? <a href="/login">Login</a></div>
    </div>
</body>

</html>
